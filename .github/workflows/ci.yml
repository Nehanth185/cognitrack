name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DATABASE_URL: postgresql://cognitrack:cognitrack@localhost:5432/cognitrack

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./apps/frontend

      - name: Lint frontend
        run: pnpm lint
        working-directory: ./apps/frontend

      - name: Typecheck frontend
        run: pnpm typecheck
        working-directory: ./apps/frontend

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
        working-directory: ./apps/backend

      - name: Lint backend
        run: ruff check .
        working-directory: ./apps/backend

      - name: Typecheck backend
        run: mypy app
        working-directory: ./apps/backend

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: cognitrack
          POSTGRES_PASSWORD: cognitrack
          POSTGRES_DB: cognitrack
        ports: 5432:5432
        options: >-
          --health-cmd "pg_isready -U cognitrack"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./apps/frontend

      - name: Test frontend
        run: pnpm test
        working-directory: ./apps/frontend

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
        working-directory: ./apps/backend

      - name: Run backend tests
        run: pytest -v
        working-directory: ./apps/backend
        env:
          DATABASE_URL: postgresql://cognitrack:cognitrack@localhost:5432/cognitrack

      - name: Run database migrations
        run: alembic upgrade head
        working-directory: ./apps/backend
        env:
          DATABASE_URL: postgresql://cognitrack:cognitrack@localhost:5432/cognitrack

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: false
          tags: cognitrack/backend:latest
          load: true

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: false
          tags: cognitrack/frontend:latest
          load: true

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway Preview
        run: echo "Preview deployment would go here"